server {
    listen 80;
    listen [::]:80;
    server_name ir.llm.persiantoolbox.ir;

    root /srv/awesome-free-llm-apis-ir/current;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://plausible.alirezasafaei.dev; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;

    location = /catalog.json {
        expires 5m;
        try_files $uri =404;
    }

    location = /build-meta.json {
        expires -1;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/ir.llm.persiantoolbox.ir.access.log;
    error_log /var/log/nginx/ir.llm.persiantoolbox.ir.error.log warn;
}
