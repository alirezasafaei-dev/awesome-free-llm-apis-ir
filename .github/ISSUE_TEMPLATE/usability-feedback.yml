name: "گزارش تجربه کاربری / Usability feedback"
description: "ثبت ساختاریافته نتیجه تست کاربر، سردرگمی یا شکست در انجام یک کار"
title: "[UX Feedback] "
labels:
  - "type:ux-research"
body:
  - type: markdown
    attributes:
      value: |
        ممنون که تجربه‌ات را ثبت می‌کنی. لطفاً **API Key، ایمیل، شماره تلفن، IP، نام حساب، Cookie، Screenshot داشبورد خصوصی یا اطلاعات هویتی** وارد نکن.

        این فرم برای سنجش فهم محصول و موفقیت در انجام کار است؛ نه پشتیبانی حساب Providerها.

  - type: dropdown
    id: audience
    attributes:
      label: نوع کاربر
      description: نزدیک‌ترین گزینه را انتخاب کن.
      options:
        - کاربر عادی / بدون تجربه API
        - برنامه‌نویس تازه‌کار
        - برنامه‌نویس باتجربه
        - طراح محصول یا پژوهشگر UX
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: دستگاه اصلی
      options:
        - موبایل
        - دسکتاپ یا لپ‌تاپ
        - تبلت
    validations:
      required: true

  - type: dropdown
    id: journey
    attributes:
      label: کدام مسیر را آزمایش کردی؟
      options:
        - صفحه اصلی
        - API Finder
        - Quick Start برنامه‌نویس
        - صفحه یک Provider
        - مسیر کامل از صفحه اصلی تا مستندات Provider
    validations:
      required: true

  - type: textarea
    id: five_second_comprehension
    attributes:
      label: بعد از پنج ثانیه فکر کردی سایت چه کاری انجام می‌دهد؟
      description: همان برداشت اولیه را با کلمات خودت بنویس؛ حتی اگر مطمئن نیستی.
      placeholder: "فکر کردم این سایت..."
    validations:
      required: true

  - type: textarea
    id: task
    attributes:
      label: کاری که می‌خواستی انجام بدهی
      placeholder: "مثلاً پیدا کردن یک API رایگان برای چت‌بات فارسی و بازکردن مستندات رسمی آن"
    validations:
      required: true

  - type: dropdown
    id: outcome
    attributes:
      label: نتیجه کار
      options:
        - موفق شدم بدون کمک
        - با کمی سردرگمی موفق شدم
        - فقط بخشی از کار را انجام دادم
        - نتوانستم کار را انجام بدهم
    validations:
      required: true

  - type: dropdown
    id: duration
    attributes:
      label: زمان تقریبی
      options:
        - کمتر از ۳۰ ثانیه
        - ۳۰ تا ۶۰ ثانیه
        - ۱ تا ۲ دقیقه
        - ۲ تا ۵ دقیقه
        - بیشتر از ۵ دقیقه
        - اندازه‌گیری نکردم
    validations:
      required: true

  - type: textarea
    id: confusion_point
    attributes:
      label: دقیقاً کجا گیج شدی؟
      description: نام صفحه، عنوان بخش، برچسب یا مرحله‌ای را که باعث مکث شد ذکر کن.
      placeholder: "وقتی به بخش ... رسیدم، نمی‌دانستم ..."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: شدت مشکل
      options:
        - بدون مشکل
        - کم — فقط کمی مکث کردم
        - متوسط — مجبور شدم چند بخش را امتحان کنم
        - زیاد — برای ادامه به کمک نیاز داشتم
        - بحرانی — هدف یا نتیجه سایت را اشتباه فهمیدم
    validations:
      required: true

  - type: dropdown
    id: confidence
    attributes:
      label: اطمینان به انتخاب نهایی
      options:
        - ۱ — اصلاً مطمئن نبودم
        - ۲
        - ۳
        - ۴
        - ۵ — کاملاً مطمئن بودم
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: انتظار داشتی چه اتفاقی بیفتد؟
      placeholder: "انتظار داشتم بعد از کلیک روی ..."

  - type: textarea
    id: suggestion
    attributes:
      label: پیشنهاد اختیاری
      description: چه تغییری باعث می‌شد کار سریع‌تر یا قابل‌فهم‌تر شود؟

  - type: checkboxes
    id: privacy
    attributes:
      label: تأیید حریم خصوصی
      options:
        - label: این گزارش شامل API Key، اطلاعات حساب، ایمیل، IP کامل یا داده شخصی نیست.
          required: true
