name: Regenerate audit fix branch once

on:
  push:
    branches:
      - fix/agnes-limits-and-repository-audits-20260716

permissions:
  contents: write

concurrency:
  group: regenerate-audit-fix-once
  cancel-in-progress: false

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate derived files
        run: |
          npm run generate
          npm run generate:tools

      - name: Run complete test suite
        run: npm test

      - name: Remove one-shot workflow and commit generated files
        run: |
          rm .github/workflows/regenerate-audit-fix-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git commit -m "chore: regenerate catalogs after repository audit"
          git push origin "HEAD:${GITHUB_REF_NAME}"
