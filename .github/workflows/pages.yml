name: Deploy website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4 # v4.2.1 — 34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@v4 # v4.3.0 — 49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npm run site:build
        env:
          SOURCE_REVISION: ${{ github.sha }}
      - uses: actions/configure-pages@v5 # v5.0.0 — 983d7736d9b0ae728b81ab479565c72886d7745b
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3 # v3.0.1 — 56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: .site-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # v4.0.5 — d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e

