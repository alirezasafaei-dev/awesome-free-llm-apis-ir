name: Sync generated artifacts

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

concurrency:
  group: sync-generated-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - name: Apply allow-listed evidence migration
        if: github.head_ref == 'agent/evidence-semantics-fix-20260722'
        shell: bash
        run: |
          set -Eeuo pipefail
          if [[ ! -f .github/scripts/apply-evidence-semantics.py ]]; then
            echo 'Evidence migration is already applied.'
            exit 0
          fi
          python .github/scripts/apply-evidence-semantics.py
          python <<'PY'
          from pathlib import Path

          path = Path('scripts/validate.mjs')
          text = path.read_text()
          before = 'evidenceType: new Set(["official_docs", "live_test", "connectivity_test", "community_report"]),'
          after = 'evidenceType: new Set(["official_docs", "live_test", "connectivity_test", "signup_test", "community_report"]),'
          if before not in text:
              raise SystemExit('validator evidence enum marker not found')
          text = text.replace(before, after, 1)

          anchor = '\n  if (evidence.type === "live_test") {'
          signup_rule = '''

          if (evidence.type === "signup_test") {
            if (!validDate(evidence.checked_at ?? "")) fail(file, `${prefix}.checked_at must be a date`);
            if (typeof evidence.source !== "string" || !evidence.source.trim()) fail(file, `${prefix}.source must be non-empty`);
            if (typeof evidence.notes_fa !== "string" || !evidence.notes_fa.trim()) fail(file, `${prefix}.notes_fa must be non-empty`);
          }
          '''.replace('          ', '')
          if anchor not in text:
              raise SystemExit('validator live-test anchor not found')
          path.write_text(text.replace(anchor, signup_rule + anchor, 1))
          PY
          git rm -f --ignore-unmatch .github/workflows/apply-evidence-semantics.yml
          git rm -f --ignore-unmatch .github/scripts/apply-evidence-semantics.py
      - run: npm ci
      - name: Regenerate canonical artifacts
        run: npm run generate
      - name: Reject unexpected writes
        shell: bash
        run: |
          set -Eeuo pipefail
          changed="$(git diff --name-only)"
          if [[ "${GITHUB_HEAD_REF}" == 'agent/evidence-semantics-fix-20260722' ]]; then
            allowed='^(README\.md|catalog\.json|data\.json|content/fa/ai-api-iran\.md|docs/METHODOLOGY\.fa\.md|schema/provider\.schema\.json|scripts/(build-guides|build-site|generate-data-json|generate-readme|test-advisor-scoring|test-provider-content-pages|validate|privacy-evidence-rules|test-evidence-privacy)\.mjs|site/(api-finder/index\.html|app\.js|compare/compare\.js|en/api-finder/index\.html|en/compare/compare\.js|en/quick-start/provider-context-en\.js|index\.html|quick-start/provider-context\.js)|data/providers/(agnes-ai|fireworks-ai|freetheai|nvidia-nim|vercel-ai-gateway)\.json|data/verification-backlog\.json|\.github/scripts/apply-evidence-semantics\.py|\.github/workflows/apply-evidence-semantics\.yml)$'
          else
            allowed='^(README\.md|catalog\.json|data\.json)$'
          fi
          unexpected="$(printf '%s\n' "$changed" | grep -Ev "$allowed" || true)"
          if [[ -n "$unexpected" ]]; then
            echo 'Workflow modified unexpected paths:' >&2
            printf '%s\n' "$unexpected" >&2
            exit 1
          fi
      - name: Validate regenerated repository
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee migration-test-output.txt
      - name: Capture migration failure tail
        if: failure() && steps.tests.outcome == 'failure' && github.head_ref == 'agent/evidence-semantics-fix-20260722'
        shell: bash
        run: tail -n 500 migration-test-output.txt > migration-test-failure-tail.txt
      - name: Upload migration diagnostic
        if: failure() && steps.tests.outcome == 'failure' && github.head_ref == 'agent/evidence-semantics-fix-20260722'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evidence-migration-failure-${{ github.sha }}
          path: migration-test-failure-tail.txt
          if-no-files-found: error
          retention-days: 1
      - name: Commit synchronized repository
        shell: bash
        run: |
          set -Eeuo pipefail
          if git diff --quiet; then
            echo 'Repository is already synchronized.'
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ "${GITHUB_HEAD_REF}" == 'agent/evidence-semantics-fix-20260722' ]]; then
            git add -A
            git commit -m 'fix(verification): preserve account barriers and sanitize evidence'
          else
            git add README.md catalog.json data.json
            git commit -m 'chore(generated): sync repository artifacts'
          fi
          git push origin "HEAD:${GITHUB_HEAD_REF}"
