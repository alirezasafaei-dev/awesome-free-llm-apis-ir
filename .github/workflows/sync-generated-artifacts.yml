name: Sync generated artifacts

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

concurrency:
  group: sync-generated-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - run: npm ci
      - name: Regenerate canonical artifacts
        run: npm run generate
      - name: Reject unexpected generator writes
        shell: bash
        run: |
          set -Eeuo pipefail
          changed="$(git diff --name-only)"
          unexpected="$(printf '%s\n' "$changed" | grep -Ev '^(README\.md|catalog\.json|data\.json)$' || true)"
          if [[ -n "$unexpected" ]]; then
            echo "Generator modified unexpected paths:" >&2
            printf '%s\n' "$unexpected" >&2
            exit 1
          fi
      - name: Validate regenerated repository
        run: npm test
      - name: Commit generated artifacts
        shell: bash
        run: |
          set -Eeuo pipefail
          if git diff --quiet -- README.md catalog.json data.json; then
            echo 'Generated artifacts are already synchronized.'
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md catalog.json data.json
          git commit -m "chore(generated): sync repository artifacts"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
