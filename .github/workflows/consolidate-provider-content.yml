name: Consolidate provider content on current main

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: provider-content-current-main-consolidation
  cancel-in-progress: false

jobs:
  consolidate-and-validate:
    if: github.head_ref == 'agent/provider-content-consolidated-current-main-20260719'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - name: Merge validated provider-content branches
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin \
            agent/provider-content-batch-3-20260718 \
            agent/provider-content-batch-4-20260718 \
            agent/provider-content-batch-five-20260718 \
            agent/provider-content-batch-six-20260718
          git merge --no-ff --no-edit origin/agent/provider-content-batch-3-20260718
          git merge --no-ff --no-edit origin/agent/provider-content-batch-4-20260718
          git merge --no-ff --no-edit origin/agent/provider-content-batch-five-20260718
          git merge --no-ff --no-edit origin/agent/provider-content-batch-six-20260718
      - name: Install dependencies
        run: npm ci
      - name: Validate full content and repository contract
        run: npm test
      - name: Validate production build
        run: |
          npm run site:build
          npm run site:check
      - name: Validate patch hygiene
        run: git diff --check HEAD~4..HEAD
      - name: Commit clean consolidated candidate
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          set -Eeuo pipefail
          rm -f .github/workflows/consolidate-provider-content.yml
          git add -A
          git commit -m "chore(content): remove one-shot consolidation workflow"
          git push origin "HEAD:${BRANCH_NAME}"
