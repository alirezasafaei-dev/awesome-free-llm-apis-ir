name: UI product gate

on:
  pull_request:
    paths:
      - "design-system/**"
      - "site/**"
      - "scripts/apply-ui-pro-max-shell.mjs"
      - "scripts/test-ui-pro-max-contract.mjs"
      - "scripts/test-ux-clarity-contract.mjs"
      - "scripts/test-developer-quick-start.mjs"
      - "package.json"
      - ".github/workflows/ui-product-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ui-product:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - run: npm ci
      - name: Validate UI Pro Max design system
        run: npm run ux:pro-max:test
      - name: Validate task-first homepage hierarchy
        run: npm run ux:clarity:test
      - name: Validate Quick Start source journey
        run: npm run ux:quick-start:test
      - name: Validate Finder source journey
        run: npm run ux:finder:test
      - name: Validate Compare source journey
        run: npm run compare:test
      - name: Validate usability research contract
        run: npm run ux:research:test
      - name: Build exact UI artifact
        run: npm run site:build
        env:
          SOURCE_REVISION: ${{ github.sha }}
      - name: Validate SEO-visible catalog controls
        run: npm run ux:seo:p0:test
      - name: Validate product navigation
        run: npm run ux:navigation:test
      - name: Validate Finder ranking semantics
        run: npm run ux:ranking:test
      - name: Validate provider content pages
        run: npm run content:providers:pages:test
      - name: Validate built site
        run: npm run site:check
      - name: Validate responsive and portable paths
        run: npm run pages:paths:test
      - name: Validate production analytics markup
        run: npm run analytics:production:test
      - name: Rebuild product artifact after isolated analytics check
        run: npm run site:build
        env:
          SOURCE_REVISION: ${{ github.sha }}
      - name: Validate production UX smoke fixtures
        run: npm run production:ux-smoke:test
      - name: Validate build regression contract
        run: npm run check:regression

  repository-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - run: npm ci
      - name: Validate provider editorial contracts
        run: npm run content:providers:validate && npm run content:providers:test && npm run content:providers:pages:test
      - name: Validate content quality contracts
        run: npm run content:audit:test && npm run content:guides:test && npm run content:fa:live:verify:dry
      - name: Validate launch and verification contracts
        run: npm run launch:links:test && npm run links:test && npm run launch:log:test && npm run verification:backlog:test
      - name: Validate generated source parity
        run: npm run generate:check
      - name: Validate catalog source parity
        run: npm run catalog:check
      - name: Validate data JSON contract
        run: npm run data:test
      - name: Validate brand assets
        run: npm run brand:test
      - name: Validate published data contract
        run: npm run site:data:test
      - name: Validate provider operations and benchmark contracts
        run: npm run verify:iran:dry && npm run upstreams:test && npm run advisor:test && npm run benchmark:validate && npm run benchmark:dry && npm run benchmark:test && npm run api-health:test
      - name: Validate production and release contracts
        run: npm run production:smoke:test && npm run production:release:verify:test && npm run production:release:orchestration:test && npm run production:ux-smoke:test && npm run post-launch:ops:test
      - name: Validate deployment and tools contracts
        run: npm run pages:paths:test && npm run analytics:production:test && npm run deploy:check && npm run deploy:test && npm run validate:tools && npm run generate:tools:check && npm run tools:test && npm run tools:site:test
      - name: Validate repository audits and Hermes contracts
        run: npm run validate:repo-audits && npm run hermes:pilot:test
