name: Patch browser cleanup race

on:
  push:
    branches:
      - agent/finder-source-truth-20260723
    paths:
      - "scripts/patch-browser-cleanup-race.mjs"
      - ".github/workflows/patch-browser-cleanup-race.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
        with:
          ref: agent/finder-source-truth-20260723
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - name: Patch cleanup and remove migration files
        run: |
          set -Eeuo pipefail
          node scripts/patch-browser-cleanup-race.mjs
          rm scripts/patch-browser-cleanup-race.mjs
          rm .github/workflows/patch-browser-cleanup-race.yml
      - name: Commit deterministic cleanup
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/test-browser-product-journeys.mjs scripts/patch-browser-cleanup-race.mjs .github/workflows/patch-browser-cleanup-race.yml
          git commit -m "fix(test): make browser cleanup deterministic"
          git push origin HEAD:agent/finder-source-truth-20260723
