name: Apply evidence semantics correction

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-evidence-semantics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/evidence-semantics-fix-20260722'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - name: Apply bounded evidence corrections
        run: python .github/scripts/apply-evidence-semantics.py
      - name: Teach the manual validator about signup evidence
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('scripts/validate.mjs')
          text = path.read_text()
          before = 'evidenceType: new Set(["official_docs", "live_test", "connectivity_test", "community_report"]),'
          after = 'evidenceType: new Set(["official_docs", "live_test", "connectivity_test", "signup_test", "community_report"]),'
          if before not in text:
              raise SystemExit('validator evidence enum marker not found')
          text = text.replace(before, after, 1)

          marker = '''  if (evidence.type === "official_docs" || evidence.type === "community_report") {
    if (!validHttps(evidence.url)) fail(file, `${prefix}.url must be an HTTPS URL`);
    if (!validDate(evidence.checked_at ?? "")) fail(file, `${prefix}.checked_at must be a date`);
    if (typeof evidence.notes_fa !== "string" || !evidence.notes_fa.trim()) fail(file, `${prefix}.notes_fa must be non-empty`);
  }
'''
          addition = marker + '''
  if (evidence.type === "signup_test") {
    if (!validDate(evidence.checked_at ?? "")) fail(file, `${prefix}.checked_at must be a date`);
    if (typeof evidence.source !== "string" || !evidence.source.trim()) fail(file, `${prefix}.source must be non-empty`);
    if (typeof evidence.notes_fa !== "string" || !evidence.notes_fa.trim()) fail(file, `${prefix}.notes_fa must be non-empty`);
  }
'''
          if marker not in text:
              raise SystemExit('validator evidence rule marker not found')
          path.write_text(text.replace(marker, addition, 1))
          PY
      - run: npm ci
      - name: Regenerate canonical artifacts
        run: npm run generate
      - name: Validate corrected repository
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt
      - name: Capture failure tail
        if: failure() && steps.tests.outcome == 'failure'
        shell: bash
        run: tail -n 400 test-output.txt > test-failure-tail.txt
      - name: Upload diagnostic tail
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evidence-test-failure-${{ github.sha }}
          path: test-failure-tail.txt
          if-no-files-found: error
          retention-days: 1
      - name: Remove one-shot patch machinery and publish correction
        shell: bash
        run: |
          set -Eeuo pipefail
          git rm .github/workflows/apply-evidence-semantics.yml
          git rm .github/scripts/apply-evidence-semantics.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md catalog.json data.json package.json content docs schema scripts site data/providers data/verification-backlog.json
          git commit -m "fix(verification): preserve account barriers and sanitize evidence"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
