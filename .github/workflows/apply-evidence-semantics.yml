name: Apply evidence semantics correction

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-evidence-semantics-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/evidence-semantics-fix-20260722'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - name: Apply bounded evidence corrections
        run: python .github/scripts/apply-evidence-semantics.py
      - run: npm ci
      - name: Regenerate canonical artifacts
        run: npm run generate
      - name: Validate corrected repository
        run: npm test
      - name: Remove one-shot patch machinery and publish correction
        shell: bash
        run: |
          set -Eeuo pipefail
          git rm .github/workflows/apply-evidence-semantics.yml
          git rm .github/scripts/apply-evidence-semantics.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md catalog.json data.json package.json content docs schema scripts site data/providers data/verification-backlog.json
          git commit -m "fix(verification): preserve account barriers and sanitize evidence"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
