name: Repair connectivity contract outputs

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'fix/connectivity-evidence-contract-20260716'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run generate
      - name: Commit generated outputs
        run: |
          if git diff --quiet; then
            echo "Generated outputs are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md catalog.json data.json
          git commit -m "chore(data): regenerate outputs for connectivity evidence"
          git push
