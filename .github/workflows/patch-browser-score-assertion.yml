name: Patch browser score assertion

on:
  push:
    branches:
      - agent/browser-product-gate-20260723
    paths:
      - "scripts/patch-browser-score-assertion.mjs"
      - ".github/workflows/patch-browser-score-assertion.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
        with:
          ref: agent/browser-product-gate-20260723
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - name: Patch assertion and remove migration files
        run: |
          set -Eeuo pipefail
          node scripts/patch-browser-score-assertion.mjs
          rm scripts/patch-browser-score-assertion.mjs
          rm .github/workflows/patch-browser-score-assertion.yml
      - name: Commit corrected browser contract
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/test-browser-product-journeys.mjs scripts/patch-browser-score-assertion.mjs .github/workflows/patch-browser-score-assertion.yml
          git commit -m "fix(test): align browser score check with clarity UI"
          git push origin HEAD:agent/browser-product-gate-20260723
