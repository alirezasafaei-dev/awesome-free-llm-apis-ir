name: Validate data

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - run: npm ci
      - name: "Hermes contract: files"
        run: node scripts/test-hermes-pilot.mjs files
      - name: "Hermes contract: context"
        run: node scripts/test-hermes-pilot.mjs context
      - name: "Hermes contract: config"
        run: node scripts/test-hermes-pilot.mjs config
      - name: "Hermes contract: bootstrap"
        run: node scripts/test-hermes-pilot.mjs bootstrap
      - name: "Hermes contract: cron"
        run: node scripts/test-hermes-pilot.mjs cron
      - name: "Hermes contract: skill"
        run: node scripts/test-hermes-pilot.mjs skill
      - name: "Hermes contract: shell syntax"
        run: node scripts/test-hermes-pilot.mjs shell
      - run: npm test

  links:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - run: npm ci
      - run: npm run check:links

  discussion-privacy:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - run: npm ci
      - name: Audit GitHub discussions for infrastructure leaks
        run: node scripts/audit-github-discussion-privacy.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
