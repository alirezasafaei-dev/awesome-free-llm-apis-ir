name: Validate data

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write

jobs:
  repair-provider-contract:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/provider-contract-roadmap-20260716'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply canonical repairs
        run: |
          node scripts/repair-provider-contract-once.mjs
          npm run providers:normalize:write
          npm run generate
      - name: Run full quality suite
        run: npm test
      - name: Persist repaired state and restore normal CI
        shell: bash
        run: |
          git fetch origin main
          rm scripts/repair-provider-contract-once.mjs
          git checkout origin/main -- .github/workflows/validate.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No repair changes to commit"
            exit 0
          fi
          git commit -m "fix(data): normalize live evidence and regenerate outputs"
          git push origin HEAD:${{ github.head_ref }}

  validate:
    if: github.event_name != 'pull_request' || github.head_ref != 'fix/provider-contract-roadmap-20260716'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test

  links:
    if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.head_ref != 'fix/provider-contract-roadmap-20260716'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check:links
