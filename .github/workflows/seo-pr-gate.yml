name: SEO PR gate

on:
  pull_request:
    paths:
      - "content/**"
      - "site/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/seo-pr-gate.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: seo-pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - run: npm ci
      - run: npm run site:build

      - name: Run strict SEO audit
        id: seo
        shell: bash
        run: |
          set +e
          npm run check:seo -- --strict > seo-pr-report.md 2>&1
          code=$?
          cat seo-pr-report.md
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Create or update PR audit comment
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          SEO_EXIT_CODE: ${{ steps.seo.outputs.exit_code || '1' }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- automated-seo-pr-gate -->';
            const report = fs.existsSync('seo-pr-report.md')
              ? fs.readFileSync('seo-pr-report.md', 'utf8')
              : 'SEO report was not produced.';
            const max = 55000;
            const clipped = report.length > max ? `${report.slice(0, max)}\n\n[truncated]` : report;
            const passed = process.env.SEO_EXIT_CODE === '0';
            const body = `${marker}\n## SEO PR gate: ${passed ? 'PASS' : 'FAIL'}\n\n\`\`\`text\n${clipped}\n\`\`\`\n\nThis comment is updated automatically for the latest PR audit.`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Enforce strict SEO result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.seo.outputs.exit_code }}" != "0" ]; then
            echo "Strict SEO audit failed."
            exit 1
          fi
