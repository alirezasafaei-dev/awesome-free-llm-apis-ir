name: Temporary data refresh autogenerate

on:
  push:
    branches:
      - agent/data-refresh-groq-cerebras-20260718

permissions:
  contents: write

concurrency:
  group: data-refresh-groq-cerebras-20260718
  cancel-in-progress: true

jobs:
  regenerate-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out refresh branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: agent/data-refresh-groq-cerebras-20260718

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate synchronized outputs
        run: npm run generate

      - name: Validate data and generated files
        run: npm test

      - name: Build and check site
        run: |
          npm run site:build
          npm run site:check

      - name: Verify refresh invariants
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';

          const catalog = JSON.parse(await readFile('catalog.json', 'utf8'));
          const byId = new Map(catalog.providers.map((provider) => [provider.id, provider]));
          const groq = byId.get('groq');
          const cerebras = byId.get('cerebras');

          if (!groq || !cerebras) throw new Error('Refreshed providers are missing from catalog.json');
          if (groq.models.notable.includes('qwen/qwen3-32b')) throw new Error('Deprecated Groq model remains in notable models');
          if (!groq.models.notable.includes('qwen/qwen3.6-27b')) throw new Error('Groq replacement model is missing');
          if (groq.verification.last_checked !== '2026-07-18') throw new Error('Groq verification date was not refreshed');
          if (cerebras.free_tier.requires_payment_method !== true) throw new Error('Cerebras payment-method requirement is not synchronized');
          if (cerebras.verification.last_checked !== '2026-07-18') throw new Error('Cerebras verification date was not refreshed');
          if (groq.iran_access.status !== 'verified_blocked' || cerebras.iran_access.status !== 'verified_blocked') {
            throw new Error('Iran-access classifications changed unexpectedly');
          }
          console.log('Data refresh invariants passed.');
          NODE

      - name: Commit generated outputs and remove temporary workflow
        env:
          BRANCH_NAME: agent/data-refresh-groq-cerebras-20260718
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/data-refresh-autogen.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No synchronized changes to commit."
            exit 1
          fi
          git commit -m "chore(data): regenerate Groq and Cerebras outputs"
          git push origin "HEAD:${BRANCH_NAME}"
