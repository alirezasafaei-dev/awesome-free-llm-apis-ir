name: Provider freshness

on:
  workflow_dispatch:
  schedule:
    - cron: "43 5 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: 22
      - run: npm ci
      - id: check
        shell: bash
        run: |
          set +e
          npm run check:freshness > freshness-report.md 2>&1
          code=$?
          cat freshness-report.md
          if [ "$code" -ne 0 ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi
          exit 0
      - if: steps.check.outputs.stale == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- automated-provider-freshness -->';
            const report = fs.readFileSync('freshness-report.md', 'utf8');
            const body = `${marker}\n## داده‌های منقضی‌شده\n\n${report}\n\nاین Issue خودکار ایجاد شده است. پس از بررسی مستندات رسمی و تست لازم، تاریخ‌های معتبر را به‌روزرسانی و Issue را ببندید.`;
            const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:body "${marker}"`;
            const found = await github.rest.search.issuesAndPullRequests({ q, per_page: 1 });
            if (found.data.items.length) {
              await github.rest.issues.update({
                ...context.repo,
                issue_number: found.data.items[0].number,
                title: '[Maintenance] Provider data freshness alert',
                body
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title: '[Maintenance] Provider data freshness alert',
                body
              });
            }
