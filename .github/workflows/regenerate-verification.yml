name: Regenerate verification artifacts

on:
  pull_request:

permissions:
  contents: write

jobs:
  regenerate:
    if: github.head_ref == 'agent/provider-evidence-clean-rebuild-20260721'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - run: npm ci
      - name: Generate canonical artifacts
        run: npm run generate
      - name: Commit generated artifacts
        shell: bash
        run: |
          set -Eeuo pipefail
          git add README.md catalog.json data.json
          if git diff --cached --quiet; then
            echo "Generated artifacts already current."
            exit 0
          fi
          unexpected="$(git status --short | grep -Ev '^(M | M|A |D ) (README\.md|catalog\.json|data\.json)$' || true)"
          if [ -n "$unexpected" ]; then
            printf 'Unexpected generated changes:\n%s\n' "$unexpected" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): regenerate catalog after evidence corrections"
          git push origin HEAD:${{ github.head_ref }}
